<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Mobile</title>
    <style>

/* Splash Screen Styles */
#splash-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: black;
    
    
    font-weight: bold;
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    z-index: 10;
    animation: fadeOut 5s forwards;
    font-size: 1.5cm;
        color: #fff;
        text-transform: uppercase;
        text-align: right center;
        
}

/* Home Page Styles */
#home-page {
    opacity: 0;
    visibility: hidden;
    animation: showHomePage 3s forwards;
    animation-delay: 2s; /* Delay to match the splash screen fade-out */
}



/* Animation Definitions */
/* @keyframes fadeOut {
    0% {
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
}

@keyframes showHomePage {
    0% {
        opacity: 0;
        visibility: hidden;
    }
    100% {
        opacity: 1;
        visibility: visible;
    }
} */

    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        
        

    }
    div {
         position:relative;
        display: flex;
        flex-direction: column;
        align-items:center;
        padding: 20px;
        width: 450px;
        height:350px;
        margin: 0 auto;
        justify-content: center;
        background: transparent;
        border:2px solid rgb(244,219,219,0.5);
        border-radius: 20px;
        backdrop-filter:blur(15px);
        
        
        
        
         }
    #hl {
        width:500px;
        height: auto; 
        margin-right:10px ;   }
    
    .logo {

        width: 50px;
        height: 50px;
        margin-right: 10px;
    }
    
    .app-name {
        font-size: 24px;
        font-weight: bold;
    }
    
    .button-group {
        display: flex;
        flex-direction: column;
        width: 100%;
    }
    
    .app-button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background-color: black;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    
    .app-button:hover {
        background-color: #0056b3;
    }
    #hd{
        color: red;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-weight:bolder;
        font-size: 40px;
    }
    section .bg {

               position:absolute;
               top:0;
               left:0;
               width:100%;
               height:100%;
               object-fit:cover;
               pointer-events:none;
               
    }
    section {
              position:absolute;
               align-items: center;
               justify-content: center;
               display: flex;
               width:100%;
               height:100vh;
             
    }
    
   
 </style>  
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="Images/logo.png" id="hl" alt="Logo" class="logo"> 
        <h1>David Auto Works</h1>
    </div>
    
    
    <section> 
        <img src="Images/bgcar.jpg" class="bg">
    
    <div>
        
            <img src="Images/logo.png" alt="Logo" class="logo"> 
            <h1 id="hd"><b>David Auto Works</b></h1>
    
        
            <a href="login.html"><button class="app-button">Mechanic</button></a>
            <button class="app-button">Admin</button>
            <button class="app-button">Manager</button>
            
        
    </div>
</section> 
</body>
</html>
