<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Auto Works</title>
    <style>
        section .bg {

                     position:absolute;
                      top:0;
                     left:0;
                      width:100%;
                    height:100%;
                    object-fit:cover;
                     pointer-events:none;
        }

         h2 {
        font-size: 2cm;
        color: #fff;
        text-transform: uppercase;
        text-align: right center;
        display: flex;
    }
        h2 span {
                 transition: 3.25s;

        }
        h2:hover span{
                      filter:blur(20px);
                      opacity:0;
                      transform:scale(2);
        }
        h2 span:nth-child(10n+1)
        {
            transition-delay: 0.0s;
        }
        h2 span:nth-child(10n+2)
        {
            transition-delay: 0.1s;
        }
        h2 span:nth-child(10n+3)
        {
            transition-delay: 0.2s;
        }
        h2 span:nth-child(10n+4)
        {
            transition-delay: 0.3s;
        }
        h2 span:nth-child(10n+5)
        {
            transition-delay: 0.4s;
        }
        h2 span:nth-child(10n+6)
        {
            transition-delay: 0.5s;
        }
        h2 span:nth-child(10n+7)
        {
            transition-delay: 0.6s;
        }
        h2 span:nth-child(10n+8)
        {
            transition-delay: 0.7s;
        }
        h2 span:nth-child(10n+9)
        {
            transition-delay: 0.8s;
        }
        h2 span:nth-child(10n+10)
        {
            transition-delay: 0.9s;
        }
        
        
        
        

        section .nm {
                position: relative;
                width: 100%;
                height:100vh;
                background:#111;
                display:flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
    }
    </style>
</head>
<body>
    <section> 
        <img src="Images/r-nolan-1ZhZpP91olQ-unsplash.jpg" class="bg">
    <section>
        <h2>
            <span>D</span>
            <span>A</span>
            <span>V</span>
            <span>I</span>
            <span>D&nbsp&nbsp</span>
            <span>A</span>
            <span>U</span>
            <span>T</span>
            <span>O&nbsp&nbsp</span>
            <span>W</span>
            <span>O</span>
            <span>R</span>
            <span>K</span>
            <span>S</span>
        </h2>
    </section>
    
</body>
</html>
